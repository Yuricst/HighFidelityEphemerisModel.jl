name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

# needed to allow julia-actions/cache to delete old caches that it has created
permissions:
  actions: write
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        julia-version: ['lts'] # '1', 'pre']
        julia-arch: [x64] #[x64, x86]
        os: [ubuntu-latest] # ubuntu-latest, windows-latest, macOS-latest]
        # exclude:
        #   - os: macOS-latest
        #     julia-arch: x86

    steps:
      - uses: actions/checkout@v4
      - name: Download file to ./spice/test
        run: |
          mkdir -p ./spice/test
          curl -L -o ./spice/test/naif0012.tls "https://naif.jpl.nasa.gov/pub/naif/generic_kernels/lsk/naif0012.tls"
          curl -L -o ./spice/test/de440.bsp "https://naif.jpl.nasa.gov/pub/naif/generic_kernels/spk/planets/de440.bsp"
          curl -L -o ./spice/test/gm_de440.tpc "https://naif.jpl.nasa.gov/pub/naif/generic_kernels/pck/gm_de440.tpc"
          curl -L -o ./spice/test/moon_pa_de440_200625.bpc "https://naif.jpl.nasa.gov/pub/naif/generic_kernels/pck/moon_pa_de440_200625.bpc"
          curl -L -o ./spice/test/earth_latest_high_prec.bpc "https://naif.jpl.nasa.gov/pub/naif/generic_kernels/pck/earth_latest_high_prec.bpc"
          curl -L -o ./spice/test/pck00011.tpc "https://naif.jpl.nasa.gov/pub/naif/generic_kernels/pck/pck00011.tpc"
          curl -L -o ./spice/test/moon_de440_250416.tf "https://naif.jpl.nasa.gov/pub/naif/generic_kernels/fk/satellites/moon_de440_250416.tf"
          curl -L -o ./spice/test/receding_horiz_3189_1burnApo_DiffCorr_15yr.bsp "https://naif.jpl.nasa.gov/pub/naif/misc/MORE_PROJECTS/DSG/receding_horiz_3189_1burnApo_DiffCorr_15yr.bsp"

      - name: Download MKSPK
        run: |
          mkdir -p ./spice/tools
          curl -L -o ./spice/tools/cspice.tar.Z "https://naif.jpl.nasa.gov/pub/naif/toolkit/C/PC_Linux_GCC_64bit/packages/cspice.tar.Z"
          sudo apt-get update
          sudo apt-get install -y ncompress
          uncompress -c ./spice/tools/cspice.tar.Z | tar -xf - -C ./spice/tools
          chmod +x ./spice/tools/cspice/exe/mkspk
          echo "MKSPK_CMD=$GITHUB_WORKSPACE/spice/tools/cspice/exe/mkspk" >> $GITHUB_ENV
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
          arch: ${{ matrix.julia-arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          coverage: true
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false